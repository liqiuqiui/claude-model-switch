# ============================================
# GitHub Actions 测试工作流
# ============================================
# 功能:
#   - 在 macOS 和 Ubuntu 上运行 bats 测试
#   - 在 Windows 上运行 Pester 测试
#   - 生成测试覆盖率报告
#   - 上传覆盖率到 Codecov
# ============================================

name: 测试

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  # ============================================
  # macOS / Linux Bash 测试
  # ============================================
  bash-tests:
    name: Bash 测试 (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest]
      fail-fast: false

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 bats
        run: |
          if [[ "${{ matrix.os }}" == "macos-latest" ]]; then
            brew install bats-core
          else
            sudo apt-get update
            sudo apt-get install -y bats
          fi

      - name: 运行 bats 测试
        run: |
          bats tests/test_install.bats
          bats tests/test_switch_model.bats

      - name: 安装 kcov（用于覆盖率）
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get install -y kcov

      - name: 生成覆盖率报告
        if: matrix.os == 'ubuntu-latest'
        run: |
          mkdir -p coverage
          kcov coverage bats tests/test_switch_model.bats

      - name: 上传覆盖率报告
        if: matrix.os == 'ubuntu-latest'
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage/*
          flags: bash
          name: bash-coverage
          fail_ci_if_error: false

  # ============================================
  # Windows PowerShell 测试
  # ============================================
  powershell-tests:
    name: PowerShell 测试 (Windows)
    runs-on: windows-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Pester
        shell: powershell
        run: |
          Install-Module -Name Pester -Force -Scope CurrentUser -SkipPublisherCheck
          Import-Module Pester

      - name: 运行 Pester 测试
        shell: powershell
        run: |
          $configuration = New-PesterConfiguration
          $configuration.Run.Path = "tests/"
          $configuration.Output.Verbosity = "Detailed"
          $configuration.TestResult.Enabled = $true
          $configuration.TestResult.OutputPath = "test-results.xml"
          $configuration.CodeCoverage.Enabled = $true
          $configuration.CodeCoverage.Path = "tests/*.ps1"
          $configuration.CodeCoverage.OutputPath = "coverage.xml"
          Invoke-Pester -Configuration $configuration

      - name: 上传测试结果
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pester-test-results
          path: test-results.xml

      - name: 上传覆盖率报告
        if: always()
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          flags: powershell
          name: powershell-coverage
          fail_ci_if_error: false

  # ============================================
  # 脚本语法检查
  # ============================================
  lint:
    name: 语法检查
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 检查 Bash 脚本语法
        run: |
          echo "检查 unix/install.sh..."
          bash -n unix/install.sh
          echo "检查 unix/claude-switch-model.sh..."
          bash -n unix/claude-switch-model.sh

      - name: 检查 PowerShell 脚本语法
        shell: pwsh
        run: |
          Write-Host "检查 windows/install.ps1..."
          $null = [System.Management.Automation.PSParser]::Tokenize((Get-Content windows/install.ps1 -Raw), [ref]$null)

          Write-Host "检查 windows/claude-switch-model.ps1..."
          $null = [System.Management.Automation.PSParser]::Tokenize((Get-Content windows/claude-switch-model.ps1 -Raw), [ref]$null)

          Write-Host "语法检查通过"

  # ============================================
  # 测试摘要
  # ============================================
  test-summary:
    name: 测试摘要
    runs-on: ubuntu-latest
    needs: [bash-tests, powershell-tests, lint]
    if: always()

    steps:
      - name: 检查测试结果
        run: |
          echo "## 测试结果摘要" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "${{ needs.bash-tests.result }}" == "success" ]; then
            echo "✅ Bash 测试通过 (macOS, Ubuntu)" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Bash 测试失败" >> $GITHUB_STEP_SUMMARY
          fi

          if [ "${{ needs.powershell-tests.result }}" == "success" ]; then
            echo "✅ PowerShell 测试通过 (Windows)" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ PowerShell 测试失败" >> $GITHUB_STEP_SUMMARY
          fi

          if [ "${{ needs.lint.result }}" == "success" ]; then
            echo "✅ 语法检查通过" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ 语法检查失败" >> $GITHUB_STEP_SUMMARY
          fi
